<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Log-In</title>
    <link rel="stylesheet" href="assets/css/admin-login.css">
</head>
<body>
    <header>
        <div class="qcu-logo">
            <img src="assets/images/qcu-logo.svg" alt="logo"></image>
        </div>
        <div class="header-text">
            <h1>QCU-SSC E-VOTE SYSTEM</h1>
            <p>One Account. One Vote. <span>QCU Secured</span>.</p>
        </div>
    </header>

    <section class="content">
        <div class="login-card">
            <h3> ADMIN </h3>
            <image src="assets/images/admin-logo.svg"> </image>

                <form> 
                    <div class="admin-field-row">
                        <span class="admin-field-label">Email Address: </span>
                        <input type="text" id="admin-email" placeholder="Enter Email Address">
                    </div>

                 <div class="admin-field-row password-container">
                    <span class="admin-field-label">Password: </span>
                    <input type="password" class="admin-field-value" id="admin-password" placeholder="Enter Password">
                    <img src="assets/images/mdi_eye.svg" id="togglePassword" alt="show/hide password">
</div>
                </form>

                <div class="log-in button">
                    <button class="btn-login"> LOG-IN </button>

                </div>
        </div>

    </section>
</body>
</html>
